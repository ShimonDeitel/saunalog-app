name: SaunaLog
options:
  bundleIdPrefix: com.shimondeitel.saunalog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  SaunaLog:
    type: application
    platform: iOS
    sources:
      - path: SaunaLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.saunalog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: SaunaLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SaunaLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SaunaLogTests
      - path: SaunaLog.storekit
    dependencies:
      - target: SaunaLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.saunalog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SaunaLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SaunaLogUITests
    dependencies:
      - target: SaunaLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.saunalog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  SaunaLog:
    build:
      targets:
        SaunaLog: all
        SaunaLogTests: [test]
        SaunaLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: SaunaLog.storekit
    test:
      config: Debug
      storeKitConfiguration: SaunaLog.storekit
      targets:
        - SaunaLogTests
        - SaunaLogUITests
    archive:
      config: Release
